<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div (click)="close()" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
  
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden animate-in zoom-in duration-200">
    
    <!-- Header del Modal -->
    <div class="p-6 border-b flex justify-between items-center bg-gray-50">
      <div class="flex-1">
        <input [(ngModel)]="nombre" 
               class="text-xl font-bold bg-transparent border-none outline-none focus:ring-2 focus:ring-orange-500 rounded px-2 w-full"
               placeholder="Nombre de la lista...">
      </div>
      <button (click)="close()" class="text-gray-400 hover:text-gray-600 ml-4">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Cuerpo: Listado de Libros -->
    <div class="p-6 max-h-[60vh] overflow-y-auto">
      <h4 class="text-xs font-black uppercase tracking-widest text-gray-400 mb-4">Libros en esta colección</h4>
      
      <div class="space-y-3">
        @for (libro of lista?.libros; track libro.id) {
          <div class="flex items-center gap-4 p-2 hover:bg-gray-50 rounded-xl group">
            <img [src]="libro.portada" class="w-12 h-16 object-cover rounded shadow-sm">
            <div class="flex-1">
              <p class="text-sm font-bold text-gray-800 line-clamp-1">{{ libro.titulo }}</p>
              <p class="text-xs text-gray-500">{{ libro.autor }}</p>
            </div>
            <!-- Botón para quitar libro -->
            <button (click)="quitarLibro(libro.id)" class="opacity-0 group-hover:opacity-100 p-2 text-red-400 hover:bg-red-50 rounded-lg transition-all">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        } @empty {
          <div class="py-10 text-center border-2 border-dashed rounded-2xl">
            <p class="text-gray-400 text-sm">Esta lista aún no tiene libros.</p>
          </div>
        }
      </div>
    </div>

    <!-- Footer -->
    <div class="p-6 border-t bg-gray-50 flex justify-end gap-3">
      <button (click)="close()" class="px-4 py-2 text-gray-500 font-bold text-xs uppercase tracking-widest">Cerrar</button>
      <button (click)="guardar()" class="px-6 py-2 bg-orange-500 text-white rounded-xl font-bold text-xs shadow-lg shadow-orange-200">
        Guardar cambios
      </button>
    </div>
  </div>
</div>
