<header class="sticky top-0 z-50 w-full border-b bg-card backdrop-blur">
    <div class="container mx-auto px-4">
        <div class="flex h-16 items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-8">
                <a routerLink="/" class="flex items-center gap-2">
                    <div class="text-2xl">📚</div>
                    <span class="text-xl font-bold text-primary">LinkBuk</span>
                </a>

                <!-- Navigation -->
                <nav class="hidden md:flex items-center gap-6">
                    <a routerLink="/" routerLinkActive="text-primary"
                        class="text-foreground hover:text-primary transition-colors">
                        Inicio
                    </a>
                    <a routerLink="/forum" routerLinkActive="text-primary"
                        class="text-foreground hover:text-primary transition-colors">
                        Foro
                    </a>
                    <a routerLink="/lists" routerLinkActive="text-primary"
                        class="text-foreground hover:text-primary transition-colors">
                        Listas
                    </a>
                </nav>
            </div>

            <!-- User Menu -->
            <div class="flex items-center gap-4">
                <button (click)="buscarClick()" class="p-2 hover:bg-muted rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>

                <div class="relative" (click)="toggleUserMenu()">
                    <button class="flex items-center gap-2 p-2 hover:bg-muted rounded-lg transition-colors">
                        <div
                            class="w-8 h-8 bg-primary text-primary-foreground rounded-full flex items-center justify-center font-semibold">

                        </div>
                    </button>

                    @if (showUserMenu) {
                    <div class="absolute right-0 mt-2 w-48 bg-card border border-border rounded-lg shadow-lg py-2">
                        <a routerLink="/profile" class="block px-4 py-2 hover:bg-muted transition-colors">
                            Editar perfil
                        </a>
                        <a routerLink="/settings" class="block px-4 py-2 hover:bg-muted transition-colors">
                            Configuración
                        </a>
                        <hr class="my-2 border-border">
                        <button (click)="logout()"
                            class="w-full text-left px-4 py-2 hover:bg-muted transition-colors text-destructive">
                            Cerrar sesión
                        </button>
                    </div>
                    }
                </div>
            </div>
        </div>
    </div>
</header>
