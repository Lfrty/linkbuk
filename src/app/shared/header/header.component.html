<header class="sticky top-0 z-50 w-full border-b bg-card/80 backdrop-blur-md">
    <div class="container mx-auto px-4">
        <div class="flex h-16 items-center justify-between gap-6">

            <!-- SECCIÓN IZQUIERDA: Logo y Navegación 🧭 -->
            <div class="flex items-center gap-8">
                <!-- Logo (puedes poner aquí tu img o texto) -->
                <a routerLink="/" class="font-bold text-xl tracking-tight text-primary">Linkbuk 📚</a>

                <!-- Enlaces de navegación -->
                <nav class="hidden lg:flex items-center gap-6">
                    <a routerLink="/homeusuario"
                        class="text-sm font-medium hover:text-primary transition-colors">Inicio</a>
                    <a routerLink="/listas" class="text-sm font-medium hover:text-primary transition-colors">Mis
                        Listas</a>
                    <a routerLink="/mis-resenas" class="text-sm font-medium hover:text-primary transition-colors">Mis
                        Reseñas</a>
                </nav>
            </div>

            <div class="flex items-center gap-4 flex-1 justify-end">

                <!-- Buscador compacto (max-w-xs para que sea pequeño) -->
                <app-buscador></app-buscador>

                <!-- Menú Usuario -->
                <div class="relative">
                    <button (click)="toggleUserMenu()"
                        class="flex items-center gap-2 p-2 hover:bg-muted rounded-lg transition-colors">
                        <div
                            class="w-8 h-8 bg-primary text-primary-foreground rounded-full flex items-center justify-center font-semibold">
                            {{ authService.usuarioActual()?.nombre?.charAt(0) || 'U' }}
                        </div>
                    </button>

                    @if (showUserMenu()) {
                    <div class="absolute right-0 mt-2 w-48 bg-card border border-border rounded-lg shadow-lg py-2">
                        <a routerLink="/profile" class="block px-4 py-2 hover:bg-muted transition-colors">Perfil</a>
                        <hr class="my-2 border-border">
                        <button (click)="logout()"
                            class="w-full text-left px-4 py-2 hover:bg-muted transition-colors text-destructive">
                            Cerrar sesión
                        </button>
                    </div>
                    <!-- Fondo invisible para cerrar al hacer clic fuera -->
                    <div class="fixed inset-0 z-[-1]" (click)="showUserMenu.set(false)"></div>
                    }
                </div>
            </div>

        </div>
    </div>
</header>
