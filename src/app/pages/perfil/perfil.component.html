<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-xl mx-auto bg-[--card] p-6 rounded-xl shadow-lg border border-[--border]">
        <h2>Mi Perfil</h2>

        @if (perfil){
        <form (ngSubmit)="handleSubmit()" #authForm="ngForm">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1.5 text-[--foreground]">
                    Nombre de Usuario
                </label>
                <input [(ngModel)]="perfil.nombre" name="nombre" type="text" required placeholder="Alias"
                    class="w-full px-4 py-2.5 rounded-lg bg-[--background]" />
                @if (submitted && !perfil.nombre) {
                <app-error-mensaje mensaje="El nombre no puede estar vacío" />
                }
            </div>

            @if (authService.sesion().esEspecial) {
            <div class="flex flex-col mb-4">
                <label class="font-medium">Contraseña</label>
                <input type="password" [(ngModel)]="perfil.password" name="password" class="border p-2 rounded"
                    [class.bg-[--readonly]]="isEditMode && !isAdminMode"
                    [placeholder]="perfil.id ? '*******' : 'Escribe la contraseña'">
            </div>
            }

            <div class="mb-4">
                <label class="block text-sm font-medium mb-1.5 text-[--foreground]">
                    Email
                </label>
                <input [(ngModel)]="perfil.email" name="email" type="text" required placeholder="Correo..."
                    [readonly]="isEditMode && !isAdminMode" [class.bg-[--readonly]]="isEditMode && !isAdminMode"
                    class="w-full px-4 py-2.5 rounded-lg bg-[--background]" />
            </div>


            <div class="mb-4">
                <label class="block text-sm font-medium mb-1.5 text-[--foreground]">
                    Sobre mí
                </label>
                <input [(ngModel)]="perfil.biografia" name="biografia" type="text" required placeholder="Alias"
                    class="w-full px-4 py-2.5 rounded-lg bg-[--background]" />
            </div>


            <div class="mb-5">
                <label class="block text-sm font-medium mb-1.5 text-[--foreground]">
                    Ubicación
                </label>
                <input [(ngModel)]="perfil.ubicacion" name="ubicacion" type="text" required placeholder="Alias"
                    class="w-full px-4 py-2.5 rounded-lg bg-[--background]" />
            </div>

            <div class="flex items-end gap-5 mb-4">
                <span for="check" class="text-sm font-medium text-[--foreground] cursor-pointer"> Permitir mensajes de
                    desconocidos</span>
                <input [(ngModel)]="perfil.permitir_desconocidos" type="checkbox" name="permitir_desconocidos"
                    class="w-5 h-5 accent-[--primary] cursor-pointer">
            </div>

            @if (authService.sesion().esEspecial) {
            <div class="mt-6 p-4 border-t border-white/10 bg-blue-500/5 rounded-lg">
                <label class="block text-sm font-bold text-blue-400 mb-2">Ajustes de Administrador</label>
                <select [(ngModel)]="perfil.id_rol" name="id_rol selected='perfil.id_rol'"
                    class="w-full px-4 py-2.5 rounded-lg bg-[--background] border border-blue-500/30">
                    <option [value]="1">Administrador</option>
                    <option [value]="2">Supervisor</option>
                    <option [value]="3">Usuario </option>
                </select>
            </div>
            }

            <button type="submit"
                class="ml-1 text-[--primary] font-semibold hover:underline decoration-2 underline-offset-4">
                {{ perfil?.id ? 'Actualizar Perfil' : 'Registrar Usuario' }}
            </button>
        </form>
        }
    </div>
</div>
