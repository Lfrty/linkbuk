<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
  <!-- Modal Container -->
  <div
    class="relative bg-[--card] border border-[--border] rounded-xl p-8 max-w-md w-full mx-4 shadow-2xl z-10 animate-in fade-in zoom-in duration-300">

    <!-- Close Button -->
    <button type="button" (click)="onClose()"
      class="absolute top-4 right-4 text-[--muted-foreground] hover:text-[--foreground] transition-colors">
      <span class="text-xl">✕</span>
    </button>

    <!-- Header -->
    <header class="text-center mb-8">
      <h2 class="text-3xl font-bold text-[--foreground] tracking-tight">
        {{ isLogin ? 'Bienvenido' : 'Únete a Linkbuk' }}
      </h2>
      <p class="text-[--muted-foreground] mt-2 text-sm">
        {{ isLogin ? 'Introduce tus credenciales para acceder' : 'Completa los datos para empezar' }}
      </p>
    </header>

    <form (ngSubmit)="handleSubmit()" #authForm="ngForm">

      <!-- Email Field -->
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1.5 text-[--foreground]">
          Correo electrónico
        </label>
        <input [(ngModel)]="email" name="email" type="email" required placeholder="tu@email.com"
          class="w-full px-4 py-2.5 rounded-lg bg-[--background] border border-[--border] text-[--foreground] placeholder:text-[--muted-foreground]/50 focus:ring-2 focus:ring-[--primary] focus:border-transparent outline-none transition-all" />
      </div>

      <!-- Password Field -->
      <div class="mb-6">
        <label class="block text-sm font-medium mb-1.5 text-[--foreground]">
          Contraseña
        </label>
        <input [(ngModel)]="password" name="password" type="password" required placeholder="••••••••"
          class="w-full px-4 py-2.5 rounded-lg bg-[--background] border border-[--border] text-[--foreground] placeholder:text-[--muted-foreground]/50 focus:ring-2 focus:ring-[--primary] focus:border-transparent outline-none transition-all" />
      </div>

      <!-- Submit Button -->
      <button type="submit"
        class="w-full py-3 bg-[--primary] text-[--primary-foreground] rounded-lg hover:brightness-110 active:scale-[0.98] transition-all font-bold text-lg shadow-lg">
        {{ isLogin ? 'Entrar' : 'Registrarme' }}
      </button>
    </form>

    <!-- Footer / Toggle -->
    <footer class="mt-8 pt-6 border-t border-[--border] text-center">
      <p class="text-[--muted-foreground] text-sm">
        {{ isLogin ? '¿Aún no tienes cuenta?' : '¿Ya eres miembro?' }}
        <button type="button" (click)="toggleMode()"
          class="ml-1 text-[--primary] font-semibold hover:underline decoration-2 underline-offset-4">
          {{ isLogin ? 'Crea una aquí' : 'Inicia sesión' }}
        </button>
      </p>
    </footer>
  </div>
</div>
