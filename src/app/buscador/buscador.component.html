<div class="relative w-full max-w-xs" style="overflow: visible !important;">
    <div class="relative">
        <input type="text" [value]="searchQuery()" (input)="onSearch($event)" placeholder="Buscar libros..."
            class="w-full bg-muted/50 border-none rounded-xl py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/20 transition-all">
    </div>

    @if (showResults()) {
    <div
        class="absolute top-full right-0 mt-2 w-[400px] bg-white border-2 border-black shadow-2xl p-3 text-black rounded-lg z-50">
        @for (libro of results(); track libro.work_key) {
        <div (click)="verDetalle(libro)"
            class="p-3 hover:bg-gray-100 cursor-pointer border-b border-gray-200 last:border-0 flex flex-col">
            <span class="font-bold text-sm">{{ libro.titulo }}</span>
            <span class="text-xs text-gray-500">{{ libro.autor }}</span>
        </div>
        } @empty {
        <div class="p-3 text-center text-gray-500 italic">
            No se encontraron libros... 🔍
        </div>
        }
    </div>
    <div class="fixed inset-0 z-40" (click)="showResults.set(false)"></div>
    }
</div>
