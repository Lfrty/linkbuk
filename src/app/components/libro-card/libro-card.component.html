<div (click)="cardClick.emit()" class="relative group cursor-pointer transition-all duration-300 hover:-translate-y-2">

  <!-- Contenedor de Portada -->
  <div class="relative aspect-[2/3] rounded-xl overflow-hidden shadow-md group-hover:shadow-2xl">
    <img [src]="libro.portada || '/assets/img/no-cover.jpg'"
      (error)="$any($event.target).src = 'assets/img/no-cover.jpg'" [alt]="libro.titulo"
      class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
    <!-- Overlay al hacer Hover -->
    <div
      class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4 text-white">
      <h3 class="font-bold text-sm leading-tight mb-1">{{ libro.titulo }}</h3>
      <p class="text-xs text-gray-300 mb-2">{{ libro.autor }}</p>
    </div>
  </div>
</div>
