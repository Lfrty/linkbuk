<div class="container mt-4">
    <div class="row">
        <!-- 🔄 Iteramos sobre cada lista -->
        <div class="col-md-4 mb-4" *ngFor="let lista of listas">
            <div class="card h-100 shadow-sm border-0">

                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="card-title m-0 text-primary">{{ lista.nombre }}</h5>
                        <!-- 🏷️ Distintivo para listas automáticas -->
                        <span *ngIf="lista.es_default" class="badge rounded-pill bg-light text-dark border">
                            Predeterminada
                        </span>
                    </div>
                    <p class="card-text text-muted small">
                        {{ lista.descripcion || 'Sin descripción disponible.' }}
                    </p>
                </div>

                <div class="card-footer bg-transparent border-0 d-flex justify-content-end pb-3">
                    <button class="btn btn-sm btn-outline-primary me-2">Ver libros 📖</button>

                    <!-- 🗑️ Botón de borrar con lógica de seguridad -->
                    <button *ngIf="!lista.es_default" class="btn btn-sm btn-outline-danger" (click)="borrar(lista.id)">
                        Eliminar
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
